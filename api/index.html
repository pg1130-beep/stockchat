<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>MarketBot — AI 시황 상담</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #222538;
    --border: #2a2d3e; --accent: #4f8ef7; --green: #00c896;
    --red: #f75050; --text: #e8eaf0; --muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  .layout { display: flex; height: 100vh; }
  .left  { flex: 2; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
  .right { flex: 1; display: flex; flex-direction: column; min-width: 340px; }

  /* 공통 헤더 */
  .panel-head { padding: 14px 20px; background: var(--surface);
                border-bottom: 1px solid var(--border); flex-shrink: 0;
                display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo .title { font-size: 16px; font-weight: 700; color: #fff; }
  .logo .sub { font-size: 11px; color: var(--muted); }
  .badge { background: var(--green); color: #000; font-size: 9px; font-weight: 700;
           padding: 2px 7px; border-radius: 20px; }
  .ghost-btn { background: none; border: 1px solid var(--border); color: var(--muted);
               padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
  .ghost-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 왼쪽 스크롤 영역 */
  .left-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 22px; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--muted);
                   letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 11px; }

  /* 시세 카드 */
  .ticker-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border);
          border-radius: 10px; padding: 14px 16px; flex: 1 1 150px; }
  .card .label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .card .price { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .card .price .cur { font-size: 11px; color: var(--muted); margin-left: 4px; }
  .card .chg { margin-top: 5px; font-size: 13px; font-weight: 600; }
  .up { color: var(--green); } .down { color: var(--red); }
  .skeleton { opacity: 0.4; }
  .skeleton div { background: var(--border); border-radius: 4px; margin-bottom: 8px; }

  /* 시장 요약 */
  .summary { background: var(--surface); border: 1px solid var(--border);
             border-radius: 10px; overflow: hidden; }
  .summary-row { display: flex; align-items: center; justify-content: space-between;
                 padding: 11px 16px; border-bottom: 1px solid #1f2130; font-size: 13px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .name { color: #c8cadb; }
  .summary-row .meta { display: flex; align-items: center; gap: 10px; }
  .summary-row .desc { font-size: 12px; color: var(--muted); }
  .summary-row .pct { font-size: 13px; font-weight: 700; min-width: 60px; text-align: right; }

  /* 빠른 질문 */
  .quick { display: flex; flex-direction: column; gap: 8px; }
  .quick button { background: var(--surface); border: 1px solid var(--border); color: #c8cadb;
                  padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
                  text-align: left; transition: border-color .15s; }
  .quick button:hover { border-color: var(--accent); }

  /* 메모 */
  .memo-box { border-top: 1px solid var(--border); padding: 14px 20px;
              background: var(--surface); flex-shrink: 0; }
  .memo-box .section-title { margin-bottom: 8px; }
  .memo-box textarea { width: 100%; background: var(--bg); border: 1px solid var(--border);
                       color: var(--text); padding: 10px 12px; border-radius: 8px;
                       font-size: 13px; line-height: 1.6; resize: vertical;
                       font-family: inherit; outline: none; }
  .memo-box textarea:focus { border-color: var(--accent); }

  /* 채팅 */
  .chat-msgs { flex: 1; overflow-y: auto; padding: 16px 14px;
               display: flex; flex-direction: column; gap: 14px; }
  .empty-hint { color: var(--muted); font-size: 13px; text-align: center; margin: auto; line-height: 1.8; }
  .msg-wrap { display: flex; flex-direction: column; gap: 3px; }
  .msg-wrap.user { align-items: flex-end; }
  .msg-wrap.ai { align-items: flex-start; }
  .sender { font-size: 10px; color: var(--muted); padding: 0 4px; }
  .bubble { max-width: 92%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.65; }
  .user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 3px; white-space: pre-wrap; }
  .ai .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  .ai .bubble.thinking { color: var(--muted); font-style: italic; }

  /* 마크다운 (채팅 AI) */
  .bubble p { margin: 4px 0 8px; } .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { color: #fff; } .bubble em { color: var(--muted); }
  .bubble h1,.bubble h2,.bubble h3 { margin: 10px 0 5px; color: #fff; }
  .bubble h1 { font-size: 16px; } .bubble h2 { font-size: 15px; } .bubble h3 { font-size: 14px; }
  .bubble ul,.bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }
  .bubble blockquote { border-left: 3px solid var(--accent); padding-left: 10px;
                       margin: 8px 0; color: var(--muted); font-style: italic; }
  .bubble code { background: var(--surface2); color: #a5b4fc; padding: 2px 6px;
                 border-radius: 4px; font-size: 12px; font-family: monospace; }
  .bubble pre { background: var(--surface2); border: 1px solid var(--border);
                border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
  .bubble pre code { background: none; padding: 0; }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .bubble a { color: var(--accent); text-decoration: none; }
  .bubble .table-scroll { overflow-x: auto; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); }
  .bubble table { border-collapse: collapse; width: 100%; min-width: 300px; font-size: 12px; }
  .bubble thead tr { background: var(--surface2); }
  .bubble th { padding: 8px 14px; text-align: left; font-size: 10px; font-weight: 600;
               letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted);
               white-space: nowrap; border-bottom: 1px solid var(--border); }
  .bubble td { padding: 8px 14px; border-bottom: 1px solid #1a1d27; white-space: nowrap; }
  .bubble tbody tr:last-child td { border-bottom: none; }
  .bubble tbody tr:hover td { background: rgba(79,142,247,0.05); }

  /* 채팅 입력 */
  .chat-form { padding: 12px 14px; background: var(--surface);
               border-top: 1px solid var(--border); flex-shrink: 0; display: flex; gap: 8px; }
  .chat-form input { flex: 1; background: var(--bg); border: 1px solid var(--border);
                     color: var(--text); padding: 9px 12px; border-radius: 10px; font-size: 13px; outline: none; }
  .chat-form input:focus { border-color: var(--accent); }
  .chat-form button { background: var(--accent); color: #fff; border: none;
                      padding: 9px 16px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .chat-form button:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  .dots span { display: inline-block; width: 4px; height: 4px; border-radius: 50%;
               background: var(--muted); animation: blink 1.2s infinite; }
  .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* 심층 분석 워크플로우 */
  .workflow { background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .workflow-toggle { width: 100%; background: none; border: none; cursor: pointer;
                     color: var(--text); padding: 10px 16px; font-size: 13px; font-weight: 600;
                     display: flex; align-items: center; justify-content: space-between; }
  .workflow-toggle:hover { color: var(--accent); }
  .workflow-body { display: none; padding: 0 16px 14px; }
  .workflow.open .workflow-body { display: block; }
  .wf-steps { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .wf-steps label { font-size: 11.5px; color: var(--muted); display: flex; align-items: flex-start; gap: 7px; line-height: 1.4; }
  .wf-steps input { accent-color: var(--green); margin-top: 1px; }
  .wf-form { display: flex; gap: 8px; }
  .wf-form input { flex: 1; background: var(--bg); border: 1px solid var(--border);
                   color: var(--text); padding: 9px 12px; border-radius: 9px; font-size: 13px; outline: none; }
  .wf-form input:focus { border-color: var(--accent); }
  .wf-form button { background: var(--green); color: #003; border: none;
                    padding: 9px 16px; border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: 700; white-space: nowrap; }
  .wf-form button:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .wf-note { margin-top: 9px; font-size: 10.5px; color: var(--muted); }

  /* 공유 버튼 */
  .msg-actions { margin-top: 6px; padding: 0 2px; }
  .share-btn { background: #FEE500; color: #191600; border: none; border-radius: 8px;
               padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
               display: inline-flex; align-items: center; gap: 4px; }
  .share-btn:hover { filter: brightness(0.94); }
  .share-btn:active { transform: scale(0.97); }

  /* 구독 섹션 */
  .subscribe-box { border-top: 1px solid var(--border); padding: 14px 20px;
                   background: var(--surface); flex-shrink: 0; }
  .subscribe-box .section-title { margin-bottom: 10px; }
  .sub-toggle { width: 100%; background: none; border: 1px solid var(--border);
                color: var(--muted); padding: 8px 12px; border-radius: 8px;
                cursor: pointer; font-size: 12px; text-align: left;
                display: flex; justify-content: space-between; align-items: center; }
  .sub-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .sub-toggle.active { border-color: var(--green); color: var(--green); }
  .sub-form { display: none; margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  .sub-form.open { display: flex; }
  .sub-form input { background: var(--bg); border: 1px solid var(--border);
                    color: var(--text); padding: 9px 12px; border-radius: 8px;
                    font-size: 13px; outline: none; width: 100%; }
  .sub-form input:focus { border-color: var(--accent); }
  .sub-form .sub-hint { font-size: 11px; color: var(--muted); }
  .sub-form .sub-actions { display: flex; gap: 8px; }
  .sub-form .sub-save { flex: 1; background: var(--accent); color: #fff; border: none;
                        padding: 9px; border-radius: 8px; cursor: pointer;
                        font-size: 13px; font-weight: 600; }
  .sub-form .sub-save:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .sub-form .sub-cancel { background: none; border: 1px solid var(--border); color: var(--muted);
                          padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .sub-status { margin-top: 10px; font-size: 12px; padding: 8px 12px; border-radius: 8px; display: none; }
  .sub-status.ok  { background: rgba(0,200,150,.12); color: var(--green); display: block; }
  .sub-status.err { background: rgba(247,80,80,.12);  color: var(--red);   display: block; }

  /* 토스트 */
  #toast { position: fixed; bottom: 84px; left: 50%;
           transform: translateX(-50%) translateY(20px);
           background: var(--surface2); color: var(--text);
           padding: 10px 18px; border-radius: 10px; font-size: 13px;
           border: 1px solid var(--border); opacity: 0; pointer-events: none;
           transition: opacity .25s, transform .25s; z-index: 100; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 모바일 하단 탭바 — 데스크탑에서는 숨김 */
  .mobile-tabs { display: none; }

  /* ── 모바일 (≤768px) ───────────────────────────────── */
  @media (max-width: 768px) {
    body { height: 100dvh; }
    .layout { flex-direction: column; height: 100dvh; }

    /* 두 패널을 전체폭으로, 탭으로 전환 */
    .left, .right {
      flex: none; width: 100%; min-width: 0;
      height: calc(100dvh - 56px); /* 탭바 높이 제외 */
      border-right: none;
    }
    .right { display: none; }                 /* 기본: 시세 탭 */
    body.tab-chat .left  { display: none; }
    body.tab-chat .right { display: flex; }

    /* 시세 카드 2열 */
    .card { flex: 1 1 calc(50% - 5px); padding: 12px 14px; }
    .card .price { font-size: 16px; }

    .panel-head { padding: 12px 16px; }
    .logo .title { font-size: 15px; }
    .left-scroll { padding: 16px; gap: 18px; }
    .memo-box { padding: 12px 16px; }
    .memo-box textarea { rows: 3; }

    .bubble { max-width: 90%; font-size: 14px; }
    .chat-msgs { padding: 14px 12px; }

    /* 하단 탭바 */
    .mobile-tabs {
      display: flex; height: 56px; flex-shrink: 0;
      background: var(--surface); border-top: 1px solid var(--border);
    }
    .mobile-tabs button {
      flex: 1; background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 12px; font-weight: 600;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px;
    }
    .mobile-tabs button .ico { font-size: 18px; }
    .mobile-tabs button.active { color: var(--accent); }
  }
</style>
</head>
<body>
<div class="layout">

  <!-- 왼쪽 2/3 — 시황 대시보드 -->
  <div class="left">
    <div class="panel-head">
      <div class="logo">
        <span style="font-size:20px">📈</span>
        <div>
          <div class="title">MarketBot</div>
          <div class="sub">AI 시황 분석 · 종목 상담</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="updated" class="sub"></span>
        <button class="ghost-btn" onclick="loadMarket()">↻ 새로고침</button>
      </div>
    </div>

    <div class="left-scroll">
      <section>
        <div class="section-title">주요 시세</div>
        <div id="tickers" class="ticker-grid"></div>
      </section>

      <section>
        <div class="section-title">빠른 분석 요청</div>
        <div class="quick" id="quick"></div>
      </section>

      <section>
        <div class="section-title">시장 요약</div>
        <div id="summary" class="summary"></div>
      </section>
    </div>

    <div class="memo-box">
      <div class="section-title">📝 메모 (자동 저장)</div>
      <textarea id="memo" rows="4" placeholder="투자 아이디어, 주의 종목, 매매 계획 등을 자유롭게 메모하세요..."></textarea>
    </div>

    <!-- 정기 리포트 구독 -->
    <div class="subscribe-box">
      <div class="section-title">📧 정기 리포트 구독</div>
      <button class="sub-toggle" id="sub-toggle" onclick="toggleSubForm()">
        <span id="sub-toggle-label">매일 아침 8시 관심종목 분석 리포트 받기</span>
        <span id="sub-toggle-arrow">▾</span>
      </button>
      <div class="sub-form" id="sub-form">
        <input id="sub-email" type="email" placeholder="이메일 주소">
        <input id="sub-tickers" type="text" placeholder="관심종목 (쉼표 구분, 예: 삼성전자, AAPL, 005930.KS)">
        <div class="sub-hint">· 매일 08:00 KST 발송 · 한글 종목명 자동 변환 · 언제든 취소 가능</div>
        <div class="sub-actions">
          <button class="sub-save" id="sub-save" onclick="saveSubscription()">구독 신청</button>
          <button class="sub-cancel" onclick="cancelSubForm()">취소</button>
        </div>
        <div class="sub-status" id="sub-status"></div>
      </div>
    </div>
  </div>

  <!-- 오른쪽 1/3 — 채팅 -->
  <div class="right">
    <div class="panel-head">
      <div style="display:flex;align-items:center;gap:8px">
        <span>💬</span>
        <span style="font-size:14px;font-weight:600">AI 상담</span>
        <span class="badge">LIVE</span>
      </div>
      <button class="ghost-btn" onclick="clearChat()">초기화</button>
    </div>

    <!-- 심층 분석 워크플로우 -->
    <div class="workflow">
      <button class="workflow-toggle" id="wf-toggle" onclick="toggleWorkflow()">
        <span>📊 페르소나 심층 분석 리포트</span>
        <span id="wf-arrow">▾</span>
      </button>
      <div class="workflow-body" id="wf-body">
        <div class="wf-steps">
          <label><input type="checkbox" checked disabled> Step 1 · 정량 데이터 (MA20·이격도·ATR·거래량 변화율)</label>
          <label><input type="checkbox" checked disabled> Step 1.5 · 시장 레짐 감지 (6지표 → 점수)</label>
          <label><input type="checkbox" checked disabled> Step 2 · 정성 데이터 (뉴스·목표주가)</label>
          <label><input type="checkbox" checked disabled> Step 3·4 · 3페르소나 분석 (개미·기관·외국인)</label>
          <label><input type="checkbox" checked disabled> Step 4.5·4.7 · 손절 기준 + 안전마진</label>
        </div>
        <div class="wf-form">
          <input id="wf-ticker" placeholder="종목명 (예: 삼성전자, AAPL)" autocomplete="off">
          <button id="wf-run" onclick="runWorkflow()">리포트 생성</button>
        </div>
        <div class="wf-note">⚠️ 정량지표는 yfinance 실측값 기준 · 분석에 30~60초 소요</div>
      </div>
    </div>

    <div class="chat-msgs" id="msgs">
      <div class="empty-hint" id="hint">왼쪽 빠른 분석 버튼을 누르거나<br>직접 질문을 입력해보세요.</div>
    </div>
    <form class="chat-form" id="form">
      <input id="input" placeholder="종목, 시황, 투자 질문..." autocomplete="off" autofocus>
      <button type="submit" id="send">전송</button>
    </form>
  </div>

  <!-- 모바일 하단 탭바 -->
  <nav class="mobile-tabs">
    <button id="tab-market" class="active" onclick="switchTab('market')">
      <span class="ico">📈</span>시세
    </button>
    <button id="tab-chat" onclick="switchTab('chat')">
      <span class="ico">💬</span>AI 상담
    </button>
  </nav>

</div>

<script>
  const RENDER_API = 'https://stockchat-kka8.onrender.com';

  // ── 구독 폼 ──
  function toggleSubForm() {
    const form = document.getElementById('sub-form');
    const arrow = document.getElementById('sub-toggle-arrow');
    const isOpen = form.classList.contains('open');
    form.classList.toggle('open', !isOpen);
    arrow.textContent = isOpen ? '▾' : '▴';
    if (!isOpen) {
      // 폼 열릴 때 기존 구독 정보 불러오기
      const saved = localStorage.getItem('sub_email');
      if (saved) loadSubscription(saved);
    }
  }

  function cancelSubForm() {
    document.getElementById('sub-form').classList.remove('open');
    document.getElementById('sub-toggle-arrow').textContent = '▾';
    document.getElementById('sub-status').className = 'sub-status';
  }

  async function loadSubscription(email) {
    try {
      const r = await fetch(`${RENDER_API}/api/v2/report/subscription?email=${encodeURIComponent(email)}`);
      const d = await r.json();
      if (d.subscribed) {
        document.getElementById('sub-email').value = d.email;
        document.getElementById('sub-tickers').value = d.tickers.join(', ');
        document.getElementById('sub-save').textContent = '구독 수정';
        document.getElementById('sub-toggle').classList.add('active');
        document.getElementById('sub-toggle-label').textContent = `구독 중 · ${d.tickers.length}개 종목`;
      }
    } catch (_) {}
  }

  async function saveSubscription() {
    const email = document.getElementById('sub-email').value.trim();
    const tickersRaw = document.getElementById('sub-tickers').value.trim();
    const statusEl = document.getElementById('sub-status');
    const saveBtn = document.getElementById('sub-save');

    if (!email || !email.includes('@')) {
      statusEl.className = 'sub-status err';
      statusEl.textContent = '유효한 이메일을 입력해주세요.';
      return;
    }
    if (!tickersRaw) {
      statusEl.className = 'sub-status err';
      statusEl.textContent = '관심종목을 1개 이상 입력해주세요.';
      return;
    }

    const tickers = tickersRaw.split(',').map(t => t.trim()).filter(Boolean);
    saveBtn.disabled = true;
    saveBtn.textContent = '처리 중...';
    statusEl.className = 'sub-status';

    try {
      const r = await fetch(`${RENDER_API}/api/v2/report/subscribe`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, tickers, send_hour: 8 }),
      });
      const d = await r.json();
      if (!r.ok || d.error) throw new Error(d.error || '오류 발생');

      localStorage.setItem('sub_email', email);
      statusEl.className = 'sub-status ok';
      statusEl.textContent = `✓ ${d.message}`;
      saveBtn.textContent = '구독 수정';
      document.getElementById('sub-toggle').classList.add('active');
      document.getElementById('sub-toggle-label').textContent = `구독 중 · ${tickers.length}개 종목`;
    } catch (e) {
      statusEl.className = 'sub-status err';
      statusEl.textContent = `오류: ${e.message}`;
      saveBtn.textContent = '구독 신청';
    } finally {
      saveBtn.disabled = false;
    }
  }

  // 페이지 로드 시 구독 상태 반영
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('sub_email');
    if (saved) {
      loadSubscription(saved).then(() => {});
    }
  });
</script>

<script>
  // ── 모바일 탭 전환 ──
  function switchTab(tab) {
    document.body.classList.toggle('tab-chat', tab === 'chat');
    document.getElementById('tab-market').classList.toggle('active', tab === 'market');
    document.getElementById('tab-chat').classList.toggle('active', tab === 'chat');
  }
</script>
<script>
  const QUICK = [
    '나스닥, S&P500, 비트코인 오늘 시황 분석해줘',
    '오늘 미국 증시 주요 뉴스 알려줘',
    '삼성전자, SK하이닉스 현재 상황 어때?',
    'NVDA 최근 동향과 전망 알려줘',
  ];
  const history = [];

  // ── 빠른 질문 ──
  const quickEl = document.getElementById('quick');
  QUICK.forEach(q => {
    const b = document.createElement('button');
    b.textContent = '→ ' + q;
    b.onclick = () => sendMessage(q);
    quickEl.appendChild(b);
  });

  // ── 시세 ──
  async function loadMarket() {
    try {
      const res = await fetch('/api/market');
      const data = await res.json();
      renderTickers(data);
      renderSummary(data);
      document.getElementById('updated').textContent = new Date().toLocaleTimeString() + ' 기준';
    } catch (e) {}
  }

  function renderTickers(data) {
    const el = document.getElementById('tickers');
    el.innerHTML = '';
    data.forEach(t => {
      const card = document.createElement('div');
      card.className = 'card';
      if (t.error) {
        card.innerHTML = `<div class="label">${t.label}</div><div class="chg" style="color:var(--muted)">조회 실패</div>`;
      } else {
        const up = t.change >= 0;
        card.innerHTML = `
          <div class="label">${t.label}</div>
          <div class="price">${t.price.toLocaleString(undefined,{maximumFractionDigits:2})}<span class="cur">${t.currency}</span></div>
          <div class="chg ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(t.change).toFixed(2)}%</div>`;
      }
      el.appendChild(card);
    });
  }

  function renderSummary(data) {
    const pick = ['^GSPC','^IXIC','BTC-USD','^KS11'];
    const names = {'^GSPC':'S&P 500','^IXIC':'NASDAQ','BTC-USD':'BTC','^KS11':'KOSPI'};
    const el = document.getElementById('summary');
    el.innerHTML = '';
    pick.forEach(sym => {
      const t = data.find(x => x.symbol === sym);
      if (!t || t.error) return;
      const up = t.change >= 0;
      const row = document.createElement('div');
      row.className = 'summary-row';
      row.innerHTML = `
        <span class="name">${names[sym]}</span>
        <div class="meta">
          <span class="desc">${up?'강세':'약세'}</span>
          <span class="pct ${up?'up':'down'}">${up?'+':''}${t.change.toFixed(2)}%</span>
        </div>`;
      el.appendChild(row);
    });
  }

  // ── 메모 (Supabase 동기화 + localStorage 폴백) ──
  const memo = document.getElementById('memo');
  let memoConfigured = false;
  let memoTimer = null;

  (async function initMemo() {
    memo.value = localStorage.getItem('market-memo') || '';
    try {
      const res = await fetch('/api/memo');
      const data = await res.json();
      if (data.configured) {
        memoConfigured = true;
        if (data.content != null) {
          memo.value = data.content;
          localStorage.setItem('market-memo', data.content);
        }
      }
    } catch (e) { /* 오프라인이면 localStorage 유지 */ }
  })();

  memo.addEventListener('input', () => {
    localStorage.setItem('market-memo', memo.value);  // 항상 로컬 백업
    if (!memoConfigured) return;
    clearTimeout(memoTimer);
    memoTimer = setTimeout(async () => {
      try {
        await fetch('/api/memo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: memo.value }),
        });
      } catch (e) { /* 실패해도 로컬엔 저장됨 */ }
    }, 800);  // 디바운스
  });

  // ── 채팅 ──
  const msgsEl = document.getElementById('msgs');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  // ── 공유 (카톡으로 전달) ──
  function toast(msg) {
    let t = document.getElementById('toast');
    if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  async function shareText(text) {
    const payload = '[MarketBot 분석]\n\n' + text + '\n\n— stockchat-kappa.vercel.app';
    if (navigator.share) {
      try { await navigator.share({ title: 'MarketBot 분석', text: payload }); return; }
      catch (e) { if (e.name === 'AbortError') return; }  // 사용자가 취소
    }
    // 폴백: 클립보드 복사 (데스크탑 등 공유 미지원)
    try {
      await navigator.clipboard.writeText(payload);
      toast('📋 복사됨 — 카카오톡에 붙여넣기 하세요');
    } catch {
      toast('복사 실패 — 텍스트를 길게 눌러 복사하세요');
    }
  }

  function attachShare(wrap, text) {
    if (!text || !text.trim()) return;
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    const btn = document.createElement('button');
    btn.className = 'share-btn';
    btn.innerHTML = '💬 카톡으로 전달';
    btn.onclick = () => shareText(text);
    actions.appendChild(btn);
    wrap.appendChild(actions);
  }

  function addMsg(role, content, isThinking) {
    const hint = document.getElementById('hint');
    if (hint) hint.remove();
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + role;
    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = role === 'user' ? '나' : 'MarketBot';
    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isThinking ? ' thinking' : '');
    if (isThinking) {
      bubble.innerHTML = '분석 중 <span class="dots"><span></span><span></span><span></span></span>';
    } else if (role === 'ai') {
      bubble.innerHTML = renderMarkdown(content);
    } else {
      bubble.textContent = content;
    }
    wrap.appendChild(sender);
    wrap.appendChild(bubble);
    msgsEl.appendChild(wrap);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    return wrap;
  }

  function renderMarkdown(text) {
    const html = marked.parse(text, { breaks: true });
    // 테이블을 가로 스크롤 래퍼로 감싸기
    return html.replace(/<table>/g, '<div class="table-scroll"><table>')
               .replace(/<\/table>/g, '</table></div>');
  }

  // ── SSE 스트림 리더 (공통) ──
  async function streamSSE(url, body, { onStatus, onMeta, onDelta }) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.body) throw new Error('스트림 미지원 응답');
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        const payload = line.slice(5).trim();
        if (payload === '[DONE]') return;
        let obj;
        try { obj = JSON.parse(payload); } catch { continue; }
        if (obj.error) throw new Error(obj.error);
        if (obj.status && onStatus) onStatus(obj.status);
        if (obj.meta && onMeta) onMeta(obj.meta);
        if (obj.delta && onDelta) onDelta(obj.delta);
      }
    }
  }

  async function sendMessage(text) {
    text = text.trim();
    if (!text || sendBtn.disabled) return;
    input.value = '';
    sendBtn.disabled = true;

    // 모바일: 질문 전송 시 채팅 탭으로 전환
    if (window.matchMedia('(max-width: 768px)').matches) switchTab('chat');

    addMsg('user', text);
    const snapshot = history.slice();
    history.push({ role: 'user', content: text });
    const wrap = addMsg('ai', '', true);
    const bubble = wrap.querySelector('.bubble');
    let acc = '';

    try {
      await streamSSE('/api/chat', { message: text, history: snapshot }, {
        onDelta: (d) => {
          acc += d;
          bubble.classList.remove('thinking');
          bubble.innerHTML = renderMarkdown(acc);
          msgsEl.scrollTop = msgsEl.scrollHeight;
        },
      });
      if (!acc) { bubble.classList.remove('thinking'); bubble.textContent = '(빈 응답)'; }
      else { history.push({ role: 'ai', content: acc }); attachShare(wrap, acc); }
    } catch (e) {
      bubble.classList.remove('thinking');
      bubble.textContent = '오류: ' + e.message;
    }
    sendBtn.disabled = false;
    input.focus();
  }

  function clearChat() {
    history.length = 0;
    msgsEl.innerHTML = '<div class="empty-hint" id="hint">왼쪽 빠른 분석 버튼을 누르거나<br>직접 질문을 입력해보세요.</div>';
  }

  // ── 심층 분석 워크플로우 ──
  function toggleWorkflow() {
    const wf = document.querySelector('.workflow');
    wf.classList.toggle('open');
    document.getElementById('wf-arrow').textContent = wf.classList.contains('open') ? '▴' : '▾';
  }

  async function runWorkflow() {
    const tickerInput = document.getElementById('wf-ticker');
    const runBtn = document.getElementById('wf-run');
    const name = tickerInput.value.trim();
    if (!name) { tickerInput.focus(); return; }

    // 모바일이면 채팅 탭으로 전환
    if (window.matchMedia('(max-width: 768px)').matches) switchTab('chat');

    runBtn.disabled = true;
    runBtn.textContent = '분석 중…';
    addMsg('user', `📊 "${name}" 페르소나 심층 분석 요청`);
    const wrap = addMsg('ai', '', true);
    const bubble = wrap.querySelector('.bubble');
    const dots = '<span class="dots"><span></span><span></span><span></span></span>';
    bubble.innerHTML = '워크플로우 시작... ' + dots;
    let acc = '';

    try {
      await streamSSE('/api/analyze', { ticker: name }, {
        onStatus: (s) => { if (!acc) bubble.innerHTML = s + ' ' + dots; },
        onDelta: (d) => {
          acc += d;
          bubble.classList.remove('thinking');
          bubble.innerHTML = renderMarkdown(acc);
          msgsEl.scrollTop = msgsEl.scrollHeight;
        },
      });
      if (!acc) { bubble.classList.remove('thinking'); bubble.textContent = '(빈 리포트)'; }
      else {
        history.push({ role: 'user', content: `${name} 심층 분석 요청` });
        history.push({ role: 'ai', content: acc });
        attachShare(wrap, acc);
      }
    } catch (e) {
      bubble.classList.remove('thinking');
      bubble.textContent = '분석 실패: ' + e.message;
    }
    runBtn.disabled = false;
    runBtn.textContent = '리포트 생성';
    tickerInput.value = '';
  }

  document.getElementById('form').addEventListener('submit', e => {
    e.preventDefault();
    sendMessage(input.value);
  });

  // 초기 로드
  loadMarket();
  setInterval(loadMarket, 60000);
</script>
</body>
</html>
